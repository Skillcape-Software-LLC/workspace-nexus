## Ready-to-run Nexus — no cloning or building required.
## 1. Save this file as docker-compose.yml
## 2. Create a .env file next to it (see below)
## 3. Run: docker compose up -d
## 4. Open http://localhost:4100
##
## Minimum .env:
##   NEXUS_BASE_URL=http://localhost:4100
##   NEXUS_FRONTEND_URL=http://localhost:4100
##
## Full reference: https://github.com/chad-hollenbeck/nexus#environment-variables

services:
  nexus-api:
    image: ghcr.io/chad-hollenbeck/nexus/api:latest
    ports:
      - "5100:5000"
    volumes:
      - nexus-data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nexus-web:
    image: ghcr.io/chad-hollenbeck/nexus/web:latest
    ports:
      - "4100:80"
    depends_on:
      nexus-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  nexus-data:
